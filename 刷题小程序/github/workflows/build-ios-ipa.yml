name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app without code signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project QuizPractice.xcodeproj \
            -target QuizPractice \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/QuizPractice.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          rm -rf Payload ipa
          mkdir -p Payload ipa
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry "ipa/QuizPractice-unsigned.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: QuizPractice-unsigned-ipa
          path: ipa/QuizPractice-unsigned.ipa
